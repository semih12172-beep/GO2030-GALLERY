<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080808" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gallery" />
  <title>Gallery</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- PhotoSwipe 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.css" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ─── Reset & Variables ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #080808;
      --bg2:        #111111;
      --bg3:        #1a1a1a;
      --line:       rgba(255,255,255,0.07);
      --gold:       #d4a84b;
      --gold-dim:   rgba(212,168,75,0.18);
      --text:       #f0ede8;
      --text-muted: rgba(240,237,232,0.45);
      --radius:     4px;
      --gap:        6px;
      --header-h:   60px;
      --filter-h:   52px;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-ui:    'Syne', sans-serif;
    }

    html { background: var(--bg); color: var(--text); }
    body {
      font-family: var(--font-ui);
      background: var(--bg);
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    /* ─── Header ────────────────────────────────────────── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(8,8,8,0.98), rgba(8,8,8,0.85));
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      border-bottom: 1px solid var(--line);
    }

    #site-title {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: 1.45rem;
      letter-spacing: 0.12em;
      color: var(--text);
      user-select: none;
    }
    #site-title span {
      color: var(--gold);
      font-style: italic;
    }

    #count-badge {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    /* ─── Category Filter ───────────────────────────────── */
    #filter-wrap {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      height: var(--filter-h);
      z-index: 99;
      background: rgba(8,8,8,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      overflow: hidden;
    }

    #filter-scroll {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 100%;
      padding: 0 16px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    #filter-scroll::-webkit-scrollbar { display: none; }

    .pill {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 14px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.12);
      font-family: var(--font-ui);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      background: transparent;
      transition: all 0.22s ease;
      white-space: nowrap;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .pill:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
    .pill.active {
      background: var(--gold-dim);
      border-color: var(--gold);
      color: var(--gold);
    }
    .pill-count {
      font-size: 0.6rem;
      opacity: 0.65;
    }

    /* ─── Main Grid ─────────────────────────────────────── */
    #main {
      padding-top: calc(var(--header-h) + var(--filter-h) + 12px);
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
      padding-left: var(--gap);
      padding-right: var(--gap);
    }

    #grid {
      columns: 2;
      column-gap: var(--gap);
    }
    @media (min-width: 480px)  { #grid { columns: 3; } }
    @media (min-width: 720px)  { #grid { columns: 4; } }
    @media (min-width: 1024px) { #grid { columns: 5; } }
    @media (min-width: 1280px) { #grid { columns: 6; } }

    /* ─── Grid Items ────────────────────────────────────── */
    .item {
      break-inside: avoid;
      margin-bottom: var(--gap);
      position: relative;
      cursor: pointer;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg3);
      transform: translateZ(0);
      -webkit-tap-highlight-color: transparent;
    }

    .item img {
      display: block;
      width: 100%;
      height: auto;
      transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  filter 0.45s ease;
      will-change: transform;
    }

    .item:hover img,
    .item:focus-visible img {
      transform: scale(1.04);
      filter: brightness(1.08);
    }

    /* Video badge */
    .play-badge {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .play-badge svg {
      width: 40px; height: 40px;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.25s ease, transform 0.25s ease;
      filter: drop-shadow(0 2px 12px rgba(0,0,0,0.6));
    }
    .item:hover .play-badge svg { opacity: 1; transform: scale(1); }
    /* Always show subtle indicator on mobile */
    .item[data-type="video"]::after {
      content: '';
      position: absolute;
      top: 8px; right: 8px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 6px var(--gold);
      opacity: 0.85;
    }

    /* Caption overlay on hover (desktop) */
    .item-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 28px 10px 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
      font-size: 0.67rem;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.85);
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }
    .item:hover .item-caption { opacity: 1; transform: none; }

    /* ─── Skeleton Loader ───────────────────────────────── */
    .skeleton {
      width: 100%;
      background: linear-gradient(90deg, var(--bg3) 25%, var(--bg2) 50%, var(--bg3) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius);
      margin-bottom: var(--gap);
      break-inside: avoid;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ─── Empty State ───────────────────────────────────── */
    #empty {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      color: var(--text-muted);
      text-align: center;
      gap: 12px;
    }
    #empty svg { opacity: 0.25; }
    #empty p { font-family: var(--font-display); font-size: 1.1rem; font-style: italic; }

    /* ─── Loading overlay ───────────────────────────────── */
    #loader {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      gap: 20px;
      transition: opacity 0.5s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }

    .loader-title {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: 2rem;
      letter-spacing: 0.2em;
      color: var(--text);
    }
    .loader-title em { color: var(--gold); font-style: italic; }

    .loader-bar {
      width: 120px;
      height: 1px;
      background: var(--line);
      overflow: hidden;
    }
    .loader-bar::after {
      content: '';
      display: block;
      height: 100%;
      width: 40%;
      background: var(--gold);
      animation: load-sweep 1.2s ease-in-out infinite;
    }
    @keyframes load-sweep {
      0%   { transform: translateX(-200%); }
      100% { transform: translateX(400%); }
    }

    /* ─── PhotoSwipe Overrides ──────────────────────────── */
    .pswp {
      --pswp-bg: #050505;
    }
    .pswp__top-bar { background: linear-gradient(to bottom, rgba(5,5,5,0.7), transparent) !important; }
    .pswp__button--close svg,
    .pswp__button--zoom svg,
    .pswp__button--arrow svg { fill: var(--text) !important; }
    .pswp__counter {
      font-family: var(--font-ui) !important;
      font-size: 0.72rem !important;
      letter-spacing: 0.1em !important;
      opacity: 0.6 !important;
    }
    .pswp__caption__center {
      font-family: var(--font-display) !important;
      font-style: italic !important;
      font-size: 0.9rem !important;
      text-align: center !important;
      color: rgba(255,255,255,0.65) !important;
    }

    /* ─── Video in Lightbox ─────────────────────────────── */
    .pswp-video-container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }
    .pswp-video-container video {
      max-width: 100%;
      max-height: 100%;
      outline: none;
      border-radius: 2px;
    }

    /* ─── Stagger animation for grid items ─────────────── */
    @keyframes item-in {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .item.appear {
      opacity: 0;
      animation: item-in 0.4s ease forwards;
    }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loader">
  <div class="loader-title">Gal<em>le</em>ry</div>
  <div class="loader-bar"></div>
</div>

<!-- Header -->
<header id="header">
  <div id="site-title">Gal<span>le</span>ry</div>
  <div id="count-badge">— items</div>
</header>

<!-- Category Filter -->
<div id="filter-wrap">
  <div id="filter-scroll"></div>
</div>

<!-- Grid -->
<main id="main">
  <div id="grid"></div>
  <div id="empty">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
      <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
    <p>此分类暂无内容</p>
  </div>
</main>

<!-- PhotoSwipe root -->
<div class="pswp" tabindex="-1" role="dialog" aria-hidden="true"></div>

<script type="module">
import PhotoSwipeLightbox from 'https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe-lightbox.esm.min.js';
import PhotoSwipe        from 'https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.esm.min.js';

// ─── State ─────────────────────────────────────────────────
let allItems   = [];   // flat array of all media items with .category
let categories = [];   // [{name, slug}]
let activeSlug = 'all';
let lightbox;

// ─── DOM refs ──────────────────────────────────────────────
const grid        = document.getElementById('grid');
const filterScroll= document.getElementById('filter-scroll');
const countBadge  = document.getElementById('count-badge');
const loader      = document.getElementById('loader');
const emptyState  = document.getElementById('empty');
const siteTitle   = document.getElementById('site-title');

// ─── Load data ─────────────────────────────────────────────
async function loadData() {
  try {
    const res  = await fetch('data.json');
    const data = await res.json();

    if (data.title) {
      const t = data.title;
      document.title = t;
      siteTitle.innerHTML = t;
    }

    categories = data.categories || [];

    allItems = [];
    categories.forEach(cat => {
      (cat.items || []).forEach(item => {
        allItems.push({ ...item, category: cat.slug });
      });
    });

    buildFilter();
    renderGrid('all');
  } catch (e) {
    console.error('Failed to load data.json', e);
  } finally {
    setTimeout(() => loader.classList.add('hidden'), 500);
    setTimeout(() => loader.remove(), 1100);
  }
}

// ─── Build filter pills ────────────────────────────────────
function buildFilter() {
  filterScroll.innerHTML = '';

  const allPill = makePill('全部', 'all', allItems.length);
  filterScroll.appendChild(allPill);

  categories.forEach(cat => {
    const count = allItems.filter(i => i.category === cat.slug).length;
    filterScroll.appendChild(makePill(cat.name, cat.slug, count));
  });

  setActivePill('all');
}

function makePill(label, slug, count) {
  const btn = document.createElement('button');
  btn.className = 'pill';
  btn.dataset.slug = slug;
  btn.innerHTML = `${label}<span class="pill-count">${count}</span>`;
  btn.addEventListener('click', () => {
    activeSlug = slug;
    setActivePill(slug);
    renderGrid(slug);
  });
  return btn;
}

function setActivePill(slug) {
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.toggle('active', p.dataset.slug === slug);
  });
}

// ─── Render grid ───────────────────────────────────────────
function renderGrid(slug) {
  const items = slug === 'all'
    ? allItems
    : allItems.filter(i => i.category === slug);

  countBadge.textContent = `${items.length} items`;
  grid.innerHTML = '';

  if (items.length === 0) {
    emptyState.style.display = 'flex';
    return;
  }
  emptyState.style.display = 'none';

  // Show skeletons while images load (rough estimate)
  const skeletons = Array.from({ length: Math.min(items.length, 12) }, () => {
    const s = document.createElement('div');
    s.className = 'skeleton';
    const h = 120 + Math.random() * 160;
    s.style.height = h + 'px';
    return s;
  });
  skeletons.forEach(s => grid.appendChild(s));

  // Build actual items
  const fragment = document.createDocumentFragment();
  items.forEach((item, idx) => {
    fragment.appendChild(buildItem(item, idx));
  });

  // Replace skeletons
  requestAnimationFrame(() => {
    grid.innerHTML = '';
    grid.appendChild(fragment);
    // Stagger reveal
    document.querySelectorAll('.item').forEach((el, i) => {
      el.style.animationDelay = Math.min(i * 28, 350) + 'ms';
      el.classList.add('appear');
    });
    initLightbox(items);
  });
}

// ─── Build single grid item ─────────────────────────────────
function buildItem(item, idx) {
  const el = document.createElement('div');
  el.className = 'item';
  el.dataset.type  = item.type || 'photo';
  el.dataset.index = idx;

  // aspect-ratio box
  const img = document.createElement('img');
  img.src     = item.thumb || item.src;
  img.alt     = item.caption || '';
  img.loading = 'lazy';
  img.decoding= 'async';
  if (item.w && item.h) {
    img.style.aspectRatio = `${item.w} / ${item.h}`;
  }
  el.appendChild(img);

  // Play icon for video
  if ((item.type || 'photo') === 'video') {
    el.insertAdjacentHTML('beforeend', `
      <div class="play-badge">
        <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="30" cy="30" r="29" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
          <path d="M24 20 L44 30 L24 40 Z" fill="rgba(255,255,255,0.9)"/>
        </svg>
      </div>`);
  }

  // Caption
  if (item.caption) {
    const cap = document.createElement('div');
    cap.className = 'item-caption';
    cap.textContent = item.caption;
    el.appendChild(cap);
  }

  return el;
}

// ─── PhotoSwipe lightbox ────────────────────────────────────
function initLightbox(items) {
  if (lightbox) { lightbox.destroy(); lightbox = null; }

  // Build pswp data list
  const pswpItems = items.map(item => {
    if ((item.type || 'photo') === 'video') {
      return {
        html: `<div class="pswp-video-container">
          <video controls playsinline preload="metadata" style="max-width:100%;max-height:100%">
            <source src="${item.src}" />
          </video>
        </div>`,
        caption: item.caption || ''
      };
    }
    return {
      src:     item.src,
      width:   item.w || 1200,
      height:  item.h || 800,
      caption: item.caption || '',
      thumb:   item.thumb || item.src
    };
  });

  lightbox = new PhotoSwipeLightbox({
    dataSource: pswpItems,
    pswpModule: PhotoSwipe,
    bgOpacity: 0.96,
    showHideAnimationType: 'zoom',
    zoomAnimationDuration: 300,
    showAnimationDuration: 320,
    hideAnimationDuration: 280,
    tapAction: 'toggle-controls',
    doubleTapAction: 'zoom',
    pinchToClose: true,
    closeOnVerticalDrag: true,
    padding: { top: 50, bottom: 50 },
  });

  // Caption support
  lightbox.on('uiRegister', function() {
    lightbox.pswp.ui.registerElement({
      name: 'caption',
      order: 9,
      isButton: false,
      appendTo: 'root',
      html: '',
      onInit(el, pswp) {
        pswp.on('change', () => {
          const curr = pswp.currSlide?.data;
          el.className = 'pswp__caption';
          const inner = document.createElement('div');
          inner.className = 'pswp__caption__center';
          inner.textContent = curr?.caption || '';
          el.innerHTML = '';
          el.appendChild(inner);
          el.style.cssText = `
            position:absolute;bottom:0;left:0;right:0;
            padding:10px 20px 20px;
            background:linear-gradient(to top,rgba(0,0,0,0.5),transparent);
            text-align:center;
          `;
        });
      }
    });
  });

  // Pause videos when slide changes
  lightbox.on('change', () => {
    document.querySelectorAll('.pswp video').forEach(v => v.pause());
  });

  lightbox.init();

  // Wire up click handlers
  document.querySelectorAll('.item').forEach((el, idx) => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      lightbox.loadAndOpen(idx);
    });
  });
}

// ─── Service Worker ─────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ─── Boot ───────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
